<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Pentest Command Index</title>
<style>
  :root {
    --bg: #0f1319;
    --panel: #161c26;
    --panel-2: #1b2331;
    --border: #263042;
    --text: #d6deea;
    --muted: #8792a3;
    --cmd-bg: #10151d;
    --focus: #6ea8fe;
    --out-bg: #1a1710;
    --out-text: #e0b978;

    --recon: #6ea8fe;
    --initial-access: #7bd88f;
    --enumeration: #c792ea;
    --credential-access: #f0a35e;
    --lateral-movement: #56c7d6;
    --privesc: #f2668b;
    --persistence: #b0b44e;
    --exfil: #d98cff;
    --misc: #8a94a6;
  }
  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.45;
  }
  code, pre, .mono { font-family: ui-monospace, "JetBrains Mono", "SF Mono", Menlo, Consolas, monospace; }

  header {
    position: sticky; top: 0; z-index: 20;
    background: linear-gradient(var(--bg), var(--bg) 82%, transparent);
    padding: 14px 20px 10px;
    border-bottom: 1px solid var(--border);
  }
  .titlebar { display: flex; align-items: baseline; gap: 12px; flex-wrap: wrap; }
  h1 { margin: 0; font-size: 16px; font-weight: 650; letter-spacing: .02em; }
  h1 .accent { color: var(--focus); }
  .stat { color: var(--muted); font-size: 12.5px; }
  .toolbar { display: flex; gap: 8px; margin-top: 10px; flex-wrap: wrap; }
  #search {
    flex: 1 1 260px; min-width: 0;
    padding: 9px 12px;
    background: var(--cmd-bg); border: 1px solid var(--border);
    border-radius: 7px; color: var(--text); font-size: 14px;
  }
  #search:focus, .chip:focus-visible, button:focus-visible {
    outline: 2px solid var(--focus); outline-offset: 1px;
  }
  .btn {
    padding: 9px 12px; background: var(--panel-2); color: var(--text);
    border: 1px solid var(--border); border-radius: 7px; cursor: pointer;
    font-size: 13px; white-space: nowrap;
  }
  .btn:hover { border-color: var(--muted); }

  .filters { margin-top: 10px; }
  .filter-row { display: flex; flex-wrap: wrap; gap: 6px; align-items: center; margin: 5px 0; }
  .flabel {
    font-size: 10.5px; text-transform: uppercase; letter-spacing: .08em;
    color: var(--muted); width: 74px; flex: none;
  }
  .chip {
    padding: 3px 9px; border: 1px solid var(--border); border-radius: 13px;
    font-size: 12px; cursor: pointer; background: var(--panel);
    color: var(--text); user-select: none; white-space: nowrap;
  }
  .chip:hover { border-color: var(--muted); }
  .chip.active { background: #223; border-color: var(--focus); color: #fff; }
  .chip .n { color: var(--muted); margin-left: 4px; font-size: 11px; }
  .chip.active .n { color: #b9c6dc; }
  /* phase chips carry their phase colour when active */
  .chip.phase.active { background: transparent; color: #fff; }

  .collapse-toggle {
    background: none; border: none; color: var(--muted); cursor: pointer;
    font-size: 12px; padding: 4px 0; margin-top: 2px;
  }

  main { padding: 12px 20px 80px; max-width: 940px; margin: 0 auto; }

  .phase-group { margin-top: 22px; }
  .phase-head {
    display: flex; align-items: center; gap: 10px;
    font-size: 12px; text-transform: uppercase; letter-spacing: .12em;
    font-weight: 650; padding-bottom: 8px; border-bottom: 1px solid var(--border);
  }
  .phase-dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .phase-head .pn { color: var(--muted); font-weight: 400; letter-spacing: .04em; }

  .entry {
    background: var(--panel);
    border: 1px solid var(--border);
    border-left: 3px solid var(--misc);
    border-radius: 8px; margin: 10px 0; overflow: hidden;
  }
  .entry-head {
    display: flex; flex-wrap: wrap; gap: 6px; align-items: center;
    padding: 9px 12px 7px;
  }
  .badge {
    font-size: 11px; padding: 1.5px 7px; border-radius: 5px;
    background: var(--panel-2); color: var(--text); border: 1px solid var(--border);
  }
  .badge.tool { color: #fff; font-weight: 600; }
  .badge.tech { color: var(--focus); border-color: transparent; background: #17202e; }
  .badge.kind { text-transform: uppercase; letter-spacing: .06em; font-size: 10px; }
  .badge.scope-external { color: #ff9b8a; }
  .badge.scope-internal { color: #7bd88f; }
  .src { margin-left: auto; font-size: 11px; color: var(--muted); }
  .context { padding: 0 12px 6px; font-size: 12.5px; color: var(--muted); }

  .cmd-wrap { position: relative; }
  pre.cmd { margin: 0; padding: 11px 44px 11px 12px; background: var(--cmd-bg);
            overflow-x: auto; font-size: 13px; line-height: 1.5; }
  pre.cmd .prompt { color: #55617a; user-select: none; }
  .copy {
    position: absolute; top: 7px; right: 7px;
    background: var(--panel-2); border: 1px solid var(--border); color: var(--muted);
    font-size: 11px; padding: 3px 8px; border-radius: 5px; cursor: pointer;
  }
  .copy:hover { color: var(--text); border-color: var(--muted); }
  .copy.done { color: #7bd88f; border-color: #2c5; }

  .out-toggle {
    display: block; width: 100%; text-align: left; cursor: pointer;
    background: none; border: none; border-top: 1px solid var(--border);
    color: var(--muted); font-size: 11.5px; padding: 6px 12px;
  }
  .out-toggle:hover { color: var(--text); }
  pre.output {
    margin: 0; padding: 10px 12px; background: var(--out-bg); color: var(--out-text);
    font-size: 12px; line-height: 1.5; overflow-x: auto; white-space: pre-wrap;
    border-top: 1px solid #2a2415;
  }
  .hidden { display: none; }
  .empty { text-align: center; color: var(--muted); padding: 48px 16px; }
  .empty b { color: var(--text); }
</style>
</head>
<body>
<header>
  <div class="titlebar">
    <h1><span class="accent">▍</span> Pentest Command Index</h1>
    <span class="stat" id="stat"></span>
  </div>
  <div class="toolbar">
    <input id="search" type="text" placeholder="Search commands, techniques, context…" autocomplete="off">
    <button class="btn" id="copyAll" title="Copy every command currently shown">Copy visible</button>
    <button class="btn" id="reset">Reset</button>
  </div>
  <div class="filters" id="filters"></div>
  <button class="collapse-toggle" id="filterToggle">Hide filters ▲</button>
</header>
<main>
  <div id="results"></div>
</main>

<script>
const FILTER_KEYS = ["phase", "tool", "technique", "scope", "kind"];
const state = { phase:new Set(), tool:new Set(), technique:new Set(), scope:new Set(), kind:new Set(), q:"" };
let DATA = { entries: [], phase_order: [] };

function phaseColor(p){ return getComputedStyle(document.documentElement).getPropertyValue('--'+p).trim() || '#8a94a6'; }

async function load(){
  try {
    const r = await fetch("index.json");
    DATA = await r.json();
  } catch(e){
    document.getElementById("results").innerHTML =
      '<div class="empty"><b>index.json not found.</b><br>Run <code>python scripts/build_index.py . site/index.json</code> first.</div>';
    return;
  }
  buildFilters();
  render();
}

function counts(key){
  const m = new Map();
  DATA.entries.forEach(e=>{ const v=e[key]||"—"; m.set(v,(m.get(v)||0)+1); });
  return m;
}

function buildFilters(){
  const box = document.getElementById("filters");
  box.innerHTML = "";
  FILTER_KEYS.forEach(key=>{
    const row = document.createElement("div");
    row.className = "filter-row";
    const label = document.createElement("span");
    label.className = "flabel"; label.textContent = key;
    row.appendChild(label);

    let vals = [...counts(key).keys()];
    if (key === "phase") {
      const order = DATA.phase_order || [];
      vals.sort((a,b)=> order.indexOf(a) - order.indexOf(b));
    } else {
      vals.sort();
    }
    const cmap = counts(key);
    vals.forEach(v=>{
      const chip = document.createElement("span");
      chip.className = "chip" + (key==="phase" ? " phase" : "");
      chip.tabIndex = 0;
      chip.innerHTML = `${v}<span class="n">${cmap.get(v)}</span>`;
      if (key==="phase") chip.style.setProperty("--pc", phaseColor(v));
      const toggle = ()=>{
        const s = state[key];
        if (s.has(v)){ s.delete(v); chip.classList.remove("active"); chip.style.borderColor=""; }
        else { s.add(v); chip.classList.add("active");
               if(key==="phase") chip.style.borderColor = phaseColor(v); }
        render();
      };
      chip.onclick = toggle;
      chip.onkeydown = (ev)=>{ if(ev.key==="Enter"||ev.key===" "){ ev.preventDefault(); toggle(); } };
      row.appendChild(chip);
    });
    box.appendChild(row);
  });
}

document.getElementById("search").addEventListener("input", e=>{ state.q = e.target.value.toLowerCase(); render(); });
document.getElementById("reset").addEventListener("click", ()=>{
  FILTER_KEYS.forEach(k=>state[k].clear());
  state.q=""; document.getElementById("search").value="";
  document.querySelectorAll(".chip.active").forEach(c=>{c.classList.remove("active");c.style.borderColor="";});
  render();
});
document.getElementById("filterToggle").addEventListener("click", (e)=>{
  const f = document.getElementById("filters");
  const hidden = f.classList.toggle("hidden");
  e.target.textContent = hidden ? "Show filters ▼" : "Hide filters ▲";
});

function matches(e){
  for (const k of FILTER_KEYS){ if (state[k].size && !state[k].has(e[k])) return false; }
  if (state.q){
    const hay = (e.command+" "+e.context+" "+e.technique+" "+e.tool+" "+e.platform+" "+(e.target||"")+" "+e.output).toLowerCase();
    if (!hay.includes(state.q)) return false;
  }
  return true;
}

function esc(s){ const d=document.createElement("div"); d.textContent=s??""; return d.innerHTML; }

function cmdHtml(command){
  // prefix each line with a dim prompt for readability
  return esc(command).split("\n").map(l=> l.trim()==="" ? "" :
    `<span class="prompt">$ </span>${l}`).join("\n");
}

function entryHtml(e){
  const pc = phaseColor(e.phase);
  const out = e.output ? `
    <button class="out-toggle" data-out="${e.id}">▸ output</button>
    <pre class="output hidden" id="out-${e.id}">${esc(e.output)}</pre>` : "";
  const scopeCls = e.scope==="external"?"scope-external":(e.scope==="internal"?"scope-internal":"");
  const platform = e.platform ? `<span class="badge">${esc(e.platform)}${e.target?" · "+esc(e.target):""}</span>` : "";
  return `
  <div class="entry" style="border-left-color:${pc}">
    <div class="entry-head">
      <span class="badge tool" style="border-color:${pc}">${esc(e.tool)}${e.subtool?"·"+esc(e.subtool):""}</span>
      <span class="badge tech">${esc(e.technique)}</span>
      ${e.scope!=="unspecified"?`<span class="badge ${scopeCls}">${esc(e.scope)}</span>`:""}
      ${platform}
      <span class="badge kind">${esc(e.kind)}</span>
      <span class="src">${esc(e.source_file)}${e.also_in&&e.also_in.length?` +${e.also_in.length}`:""}</span>
    </div>
    ${e.context?`<div class="context">${esc(e.context)}</div>`:""}
    <div class="cmd-wrap">
      <pre class="cmd mono" id="cmd-${e.id}">${cmdHtml(e.command)}</pre>
      <button class="copy" data-cmd="${e.id}">copy</button>
    </div>
    ${out}
  </div>`;
}

function render(){
  const list = DATA.entries.filter(matches);
  document.getElementById("stat").textContent =
    `${list.length} / ${DATA.entries.length} commands`;
  const res = document.getElementById("results");

  if (!list.length){
    res.innerHTML = '<div class="empty"><b>No commands match.</b><br>Loosen a filter or clear the search.</div>';
    return;
  }
  const order = DATA.phase_order || [];
  const groups = {};
  list.forEach(e=>{ (groups[e.phase] ||= []).push(e); });
  const phases = Object.keys(groups).sort((a,b)=> order.indexOf(a)-order.indexOf(b));

  res.innerHTML = phases.map(p=>{
    const pc = phaseColor(p);
    const items = groups[p].map(entryHtml).join("");
    return `<section class="phase-group">
      <div class="phase-head">
        <span class="phase-dot" style="background:${pc}"></span>
        ${p.replace(/-/g," ")}<span class="pn">${groups[p].length}</span>
      </div>${items}</section>`;
  }).join("");

  // wire copy buttons
  res.querySelectorAll(".copy").forEach(b=>{
    b.onclick = ()=>{
      const cmd = DATA.entries.find(x=>x.id===b.dataset.cmd).command;
      navigator.clipboard.writeText(cmd).then(()=>{
        b.textContent="copied"; b.classList.add("done");
        setTimeout(()=>{ b.textContent="copy"; b.classList.remove("done"); }, 1200);
      });
    };
  });
  // wire output toggles
  res.querySelectorAll(".out-toggle").forEach(t=>{
    t.onclick = ()=>{
      const pre = document.getElementById("out-"+t.dataset.out);
      const shown = !pre.classList.toggle("hidden");
      t.textContent = (shown?"▾":"▸")+" output";
    };
  });
}

document.getElementById("copyAll").addEventListener("click", (e)=>{
  const list = DATA.entries.filter(matches);
  const text = list.map(x=>x.command).join("\n");
  navigator.clipboard.writeText(text).then(()=>{
    const b=e.target; const t=b.textContent;
    b.textContent=`copied ${list.length}`; setTimeout(()=>b.textContent=t,1300);
  });
});

load();
</script>
</body>
</html>
